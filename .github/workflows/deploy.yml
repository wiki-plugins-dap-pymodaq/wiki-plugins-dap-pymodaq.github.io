name: Lint & Deploy to GitHub Pages

# Déploiement automatique du wiki statique sur GitHub Pages à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises par le déploiement GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les déploiements en attente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint, Stylelint, Prettier)
    runs-on: ubuntu-latest
    # Informatif : un écart de lint ne doit pas bloquer la publication du wiki.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  deploy:
    name: Deploy
    # Volontairement indépendant du lint : un écart de formatage ne doit pas
    # bloquer la publication d'un site statique. Le lint reste informatif.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Seul le dossier public/ est publié.
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
